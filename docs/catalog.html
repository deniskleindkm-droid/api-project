<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mikisi — Catalog Manager</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  :root{
    --bg:#0e0e0e;--surface:#1a1a1a;--card:#222;--border:#2e2e2e;
    --gold:#c9a96e;--gold-dim:#8a6d3f;--text:#e8e0d4;--mid:#888;--dim:#555;
    --published:#2d5a3d;--published-text:#6fcf97;
    --staged:#1a1a2e;--staged-text:#7b8ec8;
    --out:#3d1a1a;--out-text:#eb5757;
  }
  body{background:var(--bg);color:var(--text);font-family:'Helvetica Neue',sans-serif;min-height:100vh;}

  /* ── LOGIN ── */
  #login-screen{
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    min-height:100vh;gap:20px;
  }
  #login-screen h1{font-family:Georgia,serif;font-weight:300;font-size:28px;letter-spacing:4px;color:var(--gold);}
  #login-screen p{font-size:11px;letter-spacing:2px;color:var(--mid);text-transform:uppercase;}
  #login-screen input{
    padding:12px 16px;background:var(--surface);border:1px solid var(--border);
    color:var(--text);font-size:14px;width:280px;outline:none;letter-spacing:1px;
  }
  #login-screen button{
    padding:12px 32px;background:var(--gold);color:#0e0e0e;border:none;
    font-size:11px;letter-spacing:2px;text-transform:uppercase;cursor:pointer;font-weight:600;
  }
  #login-err{color:#eb5757;font-size:12px;display:none;}

  /* ── APP SHELL ── */
  #app{display:none;}
  header{
    background:var(--surface);border-bottom:1px solid var(--border);
    padding:16px 28px;display:flex;align-items:center;justify-content:space-between;
    position:sticky;top:0;z-index:100;
  }
  .logo{font-family:Georgia,serif;font-weight:300;font-size:20px;letter-spacing:3px;color:var(--gold);}
  .summary-pills{display:flex;gap:12px;}
  .pill{
    padding:4px 12px;border-radius:20px;font-size:11px;letter-spacing:1px;
    font-weight:600;text-transform:uppercase;
  }
  .pill.total{background:#2a2a2a;color:var(--mid);}
  .pill.pub{background:var(--published);color:var(--published-text);}
  .pill.staged{background:var(--staged);color:var(--staged-text);}

  /* ── COLLECTION TABS ── */
  .collection-tabs{
    display:flex;gap:0;border-bottom:1px solid var(--border);
    background:var(--surface);padding:0 28px;overflow-x:auto;
  }
  .col-tab{
    padding:14px 20px;font-size:11px;letter-spacing:2px;text-transform:uppercase;
    color:var(--mid);cursor:pointer;border-bottom:2px solid transparent;
    white-space:nowrap;transition:color .2s,border-color .2s;
    display:flex;align-items:center;gap:8px;
  }
  .col-tab:hover{color:var(--text);}
  .col-tab.active{color:var(--gold);border-bottom-color:var(--gold);}
  .col-tab .badge{
    background:#2a2a2a;color:var(--mid);padding:2px 7px;
    border-radius:10px;font-size:10px;font-weight:600;
  }
  .col-tab.active .badge{background:var(--gold-dim);color:var(--gold);}

  /* ── MAIN CONTENT ── */
  .main{padding:24px 28px;}

  /* ── FOLDER TABS (Published / Unpublished) ── */
  .folder-bar{
    display:flex;gap:0;margin-bottom:20px;border:1px solid var(--border);
    width:fit-content;
  }
  .folder-tab{
    padding:10px 24px;font-size:11px;letter-spacing:2px;text-transform:uppercase;
    color:var(--mid);cursor:pointer;background:var(--surface);
    border-right:1px solid var(--border);transition:all .2s;
    display:flex;align-items:center;gap:8px;
  }
  .folder-tab:last-child{border-right:none;}
  .folder-tab.active.pub{background:var(--published);color:var(--published-text);}
  .folder-tab.active.stg{background:var(--staged);color:var(--staged-text);}
  .folder-tab .count{
    font-size:10px;font-weight:700;padding:1px 6px;border-radius:8px;
    background:rgba(255,255,255,.08);
  }

  /* ── BULK BAR ── */
  .bulk-bar{
    display:flex;align-items:center;gap:12px;margin-bottom:16px;
    padding:10px 14px;background:var(--surface);border:1px solid var(--border);
  }
  .bulk-bar label{font-size:11px;letter-spacing:1px;color:var(--mid);cursor:pointer;display:flex;align-items:center;gap:8px;}
  .bulk-bar .sep{flex:1;}
  .bulk-bar span{font-size:11px;color:var(--mid);}
  .btn{
    padding:8px 18px;font-size:10px;letter-spacing:2px;text-transform:uppercase;
    font-weight:600;border:none;cursor:pointer;transition:opacity .2s;
  }
  .btn:hover{opacity:.85;}
  .btn:disabled{opacity:.35;cursor:not-allowed;}
  .btn-publish{background:var(--gold);color:#0e0e0e;}
  .btn-unpublish{background:#2a2a2a;color:var(--mid);border:1px solid var(--border);}
  .btn-publish-all{background:var(--gold-dim);color:var(--gold);border:1px solid var(--gold-dim);}
  .btn-danger{background:var(--out);color:var(--out-text);}

  /* ── PRODUCT GRID ── */
  .product-grid{
    display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:14px;
  }
  .product-card{
    background:var(--card);border:1px solid var(--border);cursor:pointer;
    position:relative;transition:border-color .2s;
  }
  .product-card:hover{border-color:var(--gold-dim);}
  .product-card.selected{border-color:var(--gold);box-shadow:0 0 0 1px var(--gold);}
  .product-card input[type=checkbox]{
    position:absolute;top:8px;left:8px;accent-color:var(--gold);
    width:16px;height:16px;cursor:pointer;z-index:2;
  }
  .card-img{
    width:100%;aspect-ratio:1;object-fit:cover;background:#1a1a1a;
    display:block;
  }
  .card-img-placeholder{
    width:100%;aspect-ratio:1;background:#1a1a1a;
    display:flex;align-items:center;justify-content:center;
    color:var(--dim);font-size:24px;
  }
  .card-body{padding:10px 12px;}
  .card-name{font-size:11px;font-weight:300;line-height:1.4;color:var(--text);margin-bottom:6px;
    display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
  .card-price{font-family:Georgia,serif;font-size:14px;color:var(--gold);margin-bottom:6px;}
  .card-badges{display:flex;gap:4px;flex-wrap:wrap;}
  .badge-stock{
    font-size:9px;letter-spacing:1px;text-transform:uppercase;font-weight:600;
    padding:2px 6px;
  }
  .badge-stock.in{background:var(--published);color:var(--published-text);}
  .badge-stock.out{background:var(--out);color:var(--out-text);}

  /* ── EMPTY STATE ── */
  .empty{
    text-align:center;padding:64px 20px;color:var(--mid);
  }
  .empty p{font-size:13px;line-height:1.8;}

  /* ── TOAST ── */
  #toast{
    position:fixed;bottom:24px;right:24px;padding:12px 20px;
    background:var(--gold);color:#0e0e0e;font-size:12px;font-weight:600;
    letter-spacing:1px;display:none;z-index:999;
  }

  /* ── LOADING ── */
  .spinner{display:inline-block;width:16px;height:16px;border:2px solid var(--border);
    border-top-color:var(--gold);border-radius:50%;animation:spin .7s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <h1>Mikisi</h1>
  <p>Catalog Manager</p>
  <input type="password" id="key-input" placeholder="Master key" autocomplete="off"
    onkeydown="if(event.key==='Enter')doLogin()">
  <button onclick="doLogin()">Enter</button>
  <div id="login-err">Incorrect key</div>
</div>

<!-- APP -->
<div id="app">
  <header>
    <div class="logo">Mikisi — Catalog</div>
    <div class="summary-pills">
      <div class="pill total" id="pill-total">— total</div>
      <div class="pill pub" id="pill-pub">— published</div>
      <div class="pill staged" id="pill-staged">— staged</div>
    </div>
  </header>

  <!-- Collection tabs -->
  <div class="collection-tabs" id="col-tabs"></div>

  <!-- Main -->
  <div class="main" id="main-area">
    <div class="empty"><p>Loading catalog…</p></div>
  </div>
</div>

<div id="toast"></div>

<script>
const API = 'https://api-project-production-d424.up.railway.app';
const COLLECTIONS = ['Rings','Necklaces','Bracelets','Earrings','Anklets','Ear Cuffs'];

let masterKey = '';
let catalog = {};
let activeCol = COLLECTIONS[0];
let activeFolder = 'published'; // 'published' | 'unpublished'
let selected = new Set();
let loading = false;

// ── LOGIN ─────────────────────────────────────────────────────────────────────
async function doLogin() {
  const key = document.getElementById('key-input').value.trim();
  if (!key) return;
  const res = await fetch(`${API}/admin/catalog?master_key=${encodeURIComponent(key)}`);
  if (!res.ok) {
    document.getElementById('login-err').style.display = 'block';
    return;
  }
  masterKey = key;
  const data = await res.json();
  catalog = data.collections;
  renderSummary(data.summary);
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  renderTabs();
  renderContent();
}

// ── SUMMARY PILLS ─────────────────────────────────────────────────────────────
function renderSummary(s) {
  document.getElementById('pill-total').textContent   = `${s.total} total`;
  document.getElementById('pill-pub').textContent     = `${s.published} published`;
  document.getElementById('pill-staged').textContent  = `${s.staged} staged`;
}

// ── COLLECTION TABS ───────────────────────────────────────────────────────────
function renderTabs() {
  const bar = document.getElementById('col-tabs');
  bar.innerHTML = COLLECTIONS.map(col => {
    const data = catalog[col] || {published:[],unpublished:[]};
    const total = data.published.length + data.unpublished.length;
    return `<div class="col-tab ${col===activeCol?'active':''}" onclick="selectCol('${col}')">
      ${col} <span class="badge">${total}</span>
    </div>`;
  }).join('');
}

function selectCol(col) {
  activeCol = col;
  selected.clear();
  renderTabs();
  renderContent();
}

// ── FOLDER TABS ───────────────────────────────────────────────────────────────
function selectFolder(folder) {
  activeFolder = folder;
  selected.clear();
  renderContent();
}

// ── MAIN RENDER ───────────────────────────────────────────────────────────────
function renderContent() {
  const data = catalog[activeCol] || {published:[],unpublished:[]};
  const products = activeFolder === 'published' ? data.published : data.unpublished;

  const pubCount = data.published.length;
  const stgCount = data.unpublished.length;

  const folderBar = `
    <div class="folder-bar">
      <div class="folder-tab pub ${activeFolder==='published'?'active':''}" onclick="selectFolder('published')">
        Published <span class="count">${pubCount}</span>
      </div>
      <div class="folder-tab stg ${activeFolder==='unpublished'?'active':''}" onclick="selectFolder('unpublished')">
        Unpublished <span class="count">${stgCount}</span>
      </div>
    </div>`;

  const actionBtn = activeFolder === 'published'
    ? `<button class="btn btn-danger" onclick="bulkAction('unpublish')" id="action-btn" disabled>Unpublish Selected</button>`
    : `<button class="btn btn-publish" onclick="bulkAction('publish')" id="action-btn" disabled>Publish Selected</button>`;

  const allBtn = activeFolder === 'published'
    ? `<button class="btn btn-unpublish" onclick="allAction('unpublish')">Unpublish All ${activeCol}</button>`
    : `<button class="btn btn-publish-all" onclick="allAction('publish')">Publish All ${activeCol}</button>`;

  const bulkBar = `
    <div class="bulk-bar">
      <label><input type="checkbox" id="select-all" onchange="toggleAll(this)"> Select all</label>
      <span id="sel-count" style="color:var(--gold);font-size:11px;display:none"></span>
      <div class="sep"></div>
      ${allBtn}
      ${actionBtn}
    </div>`;

  let grid = '';
  if (products.length === 0) {
    grid = `<div class="empty"><p>No ${activeFolder} products in ${activeCol}.</p></div>`;
  } else {
    grid = `<div class="product-grid">${products.map(p => productCard(p)).join('')}</div>`;
  }

  document.getElementById('main-area').innerHTML = folderBar + bulkBar + grid;
}

function productCard(p) {
  const img = p.image_url
    ? `<img class="card-img" src="${p.image_url}" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`
    + `<div class="card-img-placeholder" style="display:none">◇</div>`
    : `<div class="card-img-placeholder">◇</div>`;

  const stockBadge = p.in_stock
    ? `<span class="badge-stock in">In Stock</span>`
    : `<span class="badge-stock out">Out of Stock</span>`;

  return `<div class="product-card" id="card-${p.id}" onclick="toggleCard(${p.id})">
    <input type="checkbox" id="chk-${p.id}" onclick="e=>{e.stopPropagation()}" onchange="toggleSelect(${p.id},this)">
    ${img}
    <div class="card-body">
      <div class="card-name">${p.name}</div>
      <div class="card-price">$${p.final_price.toFixed(2)}</div>
      <div class="card-badges">${stockBadge}</div>
    </div>
  </div>`;
}

// ── SELECTION ─────────────────────────────────────────────────────────────────
function toggleCard(id) {
  const chk = document.getElementById(`chk-${id}`);
  chk.checked = !chk.checked;
  toggleSelect(id, chk);
}

function toggleSelect(id, chk) {
  chk.closest('.product-card').classList.toggle('selected', chk.checked);
  if (chk.checked) selected.add(id); else selected.delete(id);
  updateSelectionUI();
}

function toggleAll(allChk) {
  const data = catalog[activeCol] || {published:[],unpublished:[]};
  const products = activeFolder === 'published' ? data.published : data.unpublished;
  products.forEach(p => {
    const chk = document.getElementById(`chk-${p.id}`);
    if (chk) {
      chk.checked = allChk.checked;
      chk.closest('.product-card').classList.toggle('selected', allChk.checked);
      if (allChk.checked) selected.add(p.id); else selected.delete(p.id);
    }
  });
  updateSelectionUI();
}

function updateSelectionUI() {
  const n = selected.size;
  const countEl = document.getElementById('sel-count');
  const actionBtn = document.getElementById('action-btn');
  countEl.style.display = n > 0 ? 'block' : 'none';
  countEl.textContent = `${n} selected`;
  if (actionBtn) actionBtn.disabled = n === 0;
}

// ── ACTIONS ───────────────────────────────────────────────────────────────────
async function bulkAction(action) {
  if (selected.size === 0 || loading) return;
  const ids = [...selected];
  const label = action === 'publish' ? 'Publishing' : 'Unpublishing';
  showToast(`${label} ${ids.length} product${ids.length>1?'s':''}…`, false);
  await callPublishAPI(action, {product_ids: ids});
}

async function allAction(action) {
  if (loading) return;
  const label = action === 'publish' ? 'Publishing' : 'Unpublishing';
  showToast(`${label} all ${activeCol}…`, false);
  await callPublishAPI(action, {category: activeCol});
}

async function callPublishAPI(action, payload) {
  loading = true;
  try {
    const res = await fetch(`${API}/admin/products/${action}`, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({master_key: masterKey, ...payload})
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.detail || 'Failed');

    showToast(`Done — ${data[action+'d'] ?? (action==='publish'?data.published:data.unpublished)} products ${action}ed`);
    selected.clear();
    await reloadCatalog();
  } catch(e) {
    showToast(`Error: ${e.message}`, true);
  } finally {
    loading = false;
  }
}

async function reloadCatalog() {
  const res = await fetch(`${API}/admin/catalog?master_key=${encodeURIComponent(masterKey)}`);
  const data = await res.json();
  catalog = data.collections;
  renderSummary(data.summary);
  renderTabs();
  renderContent();
}

// ── TOAST ─────────────────────────────────────────────────────────────────────
let toastTimer;
function showToast(msg, isError=false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.background = isError ? '#c0392b' : 'var(--gold)';
  t.style.color = isError ? '#fff' : '#0e0e0e';
  t.style.display = 'block';
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.style.display='none', 3500);
}
</script>
</body>
</html>
