<style>
:root{
  --cream:#fdf9f6;
  --ivory:#f7f2ed;
  --gold:#c9a96e;
  --gold-light:#e8d5b0;
  --pink:#d4849c;
  --black:#0e0e0e;
  --charcoal:#2a2a2a;
  --mid:#6b6b6b;
  --border:#ece5dd;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;}
body{
  font-family:'Jost',sans-serif;
  background:var(--cream);
  color:var(--black);
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  min-height:100vh;
  padding:24px;
}

/* Logo */
.logo{
  font-family:'Cormorant Garamond',serif;
  font-size:28px;font-weight:400;letter-spacing:7px;
  text-transform:uppercase;color:var(--black);
  margin-bottom:48px;
}
.logo em{color:var(--gold);font-style:italic;}

/* Main card */
.card{
  background:white;
  border:1px solid var(--border);
  padding:40px 36px;
  width:100%;max-width:460px;
  text-align:center;
}

/* Spinner */
.spinner{
  width:36px;height:36px;
  border:2px solid var(--border);
  border-top-color:var(--gold);
  border-radius:50%;
  animation:spin 0.8s linear infinite;
  margin:0 auto 24px;
}
@keyframes spin{to{transform:rotate(360deg);}}

.state-label{
  font-size:10px;font-weight:300;
  letter-spacing:3px;text-transform:uppercase;
  color:var(--mid);margin-bottom:6px;
}
.state-heading{
  font-family:'Cormorant Garamond',serif;
  font-size:24px;font-weight:300;
  color:var(--black);margin-bottom:28px;
}

/* Product rows */
.product-list{
  border-top:1px solid var(--border);
  margin-top:4px;
  text-align:left;
}
.product-row{
  display:flex;align-items:center;gap:14px;
  padding:14px 0;border-bottom:1px solid var(--border);
  opacity:0;animation:fadeIn 0.4s ease forwards;
}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}
.product-img{
  width:56px;height:56px;flex-shrink:0;
  background:var(--ivory);overflow:hidden;
}
.product-img img{width:100%;height:100%;object-fit:cover;}
.product-info{flex:1;min-width:0;}
.product-name{
  font-family:'Cormorant Garamond',serif;
  font-size:15px;font-weight:400;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  margin-bottom:3px;
}
.product-variant{font-size:10px;font-weight:300;color:var(--charcoal);letter-spacing:0.5px;margin-bottom:3px;}
.product-qty{font-size:10px;font-weight:300;color:var(--mid);letter-spacing:1px;}
.product-price{
  font-family:'Cormorant Garamond',serif;
  font-size:16px;font-weight:400;color:var(--black);
  flex-shrink:0;
}
.product-check{
  color:var(--gold);font-size:14px;flex-shrink:0;
}

/* Done state */
.done-icon{
  font-size:22px;letter-spacing:6px;color:var(--gold);
  margin-bottom:14px;
}
.done-heading{
  font-family:'Cormorant Garamond',serif;
  font-size:24px;font-weight:300;
  color:var(--black);margin-bottom:8px;
}
.done-sub{
  font-size:11px;font-weight:300;color:var(--mid);
  letter-spacing:1.5px;text-transform:uppercase;
  margin-bottom:24px;
}
.progress-track{
  height:2px;background:var(--border);
  position:relative;overflow:hidden;
}
.progress-fill{
  height:100%;background:var(--gold);
  width:0%;transition:width 0.05s linear;
}

/* Error state */
.error-icon{font-size:20px;color:var(--mid);margin-bottom:12px;}
.error-msg{
  font-size:13px;font-weight:300;color:var(--mid);
  margin-bottom:20px;line-height:1.7;
}
.go-btn{
  display:inline-block;
  padding:12px 32px;
  background:var(--black);color:white;
  font-size:10px;font-weight:300;letter-spacing:3px;
  text-transform:uppercase;font-family:'Jost',sans-serif;
  text-decoration:none;cursor:pointer;border:none;
  transition:background 0.2s;
}
.go-btn:hover{background:var(--pink);}

/* Hidden */
.hidden{display:none;}

@media(max-width:480px){
  .card{padding:28px 20px;}
  .logo{font-size:22px;letter-spacing:5px;margin-bottom:36px;}
}
</style>
</head>
<body>

<div class="logo">Mik<em>i</em>si</div>

<div class="card" id="card">

  <!-- LOADING STATE -->
  <div id="state-loading">
    <div class="spinner"></div>
    <div class="state-label">Please wait</div>
    <div class="state-heading">Adding to your cart…</div>
  </div>

  <!-- PRODUCT LIST (populated by JS) -->
  <div class="product-list hidden" id="product-list"></div>

  <!-- DONE STATE -->
  <div id="state-done" class="hidden">
    <div class="done-icon">✦</div>
    <div class="done-heading">Taking you to your cart</div>
    <div class="done-sub">All items added successfully</div>
    <div class="progress-track">
      <div class="progress-fill" id="progress-fill"></div>
    </div>
  </div>

  <!-- ERROR STATE -->
  <div id="state-error" class="hidden">
    <div class="error-icon">◇</div>
    <div class="error-msg">No products were found. You'll be taken to the store.</div>
    <a href="https://mikisi.co/" class="go-btn">Go to Store</a>
  </div>

</div>

<script>
const API = 'https://api-project-production-d424.up.railway.app';
const STORE = 'https://mikisi.co';
const CART_KEY = 'mikisi_guest_cart';

// Must match index.html's cart storage exactly (sessionStorage) — this
// page previously used localStorage under the same key, which index.html
// unconditionally purges on load as "stale", silently emptying any cart
// built here right before the redirect landed. Found live 2026-07-18.
function getCart(){try{return JSON.parse(sessionStorage.getItem(CART_KEY)||'[]');}catch{return [];}}
function saveCart(items){sessionStorage.setItem(CART_KEY,JSON.stringify(items));}

function addToCart(product, qty, variant){
  const cart = getCart();
  // variantId (the internal ProductVariant id) is the primary field carried
  // through to checkout going forward — same as every other add-to-cart path
  // on the site (see docs/index.html's addToCart). optionId (Silverbene's own
  // id) is kept alongside for backward compat. Previously this bridge sent
  // neither variant_id nor a real option_id anywhere useful, so any order
  // placed via Instagram/Facebook Shop's native checkout always fell through
  // to the server's legacy text-matching fallback regardless of how good the
  // rest of the variant-ID plumbing got.
  const size = variant?.size || null;
  const color = variant?.color || null;
  const optionId = variant?.option_id != null ? String(variant.option_id) : null;
  const variantId = variant?.id != null ? variant.id : null;
  const existing = cart.find(i => i.product_id === product.id && i.selected_size === size && i.selected_color === color);
  if(existing){
    existing.quantity += qty;
    existing.subtotal = existing.price * existing.quantity;
    if(optionId) existing.selected_option_id = optionId;
    if(variantId) existing.variant_id = variantId;
  } else {
    cart.push({
      product_id: product.id,
      name: product.name,
      price: product.final_price,
      image_url: product.content_image_url || product.image_url || null,
      quantity: qty,
      subtotal: product.final_price * qty,
      selected_size: size,
      selected_color: color,
      selected_option_id: optionId,
      variant_id: variantId,
    });
  }
  saveCart(cart);
  if(typeof fbq==='function') fbq('track','AddToCart',{content_ids:[String(product.id)],content_type:'product',content_name:product.name,value:product.final_price*qty,currency:'USD'});
}

async function fetchVariantPrices(id){
  try{
    const res = await fetch(`${API}/products/${id}/variant-prices`);
    if(!res.ok) return [];
    return res.json();
  }catch{ return []; }
}

// Prefers the exact variant Meta's redirect asked for when present. Falls
// back to "first available, priced option" — the same fallback as before —
// only when no variant was actually specified, rather than unconditionally
// defaulting for every customer regardless of which variant they picked in
// Shop. requestedVariantId may be either the internal ProductVariant id (the
// current catalog scheme, see meta_feed.py's catalog_id) or the legacy
// Silverbene option_id (products not yet backfilled) — matches either, same
// as index.html's own preselectFromVariantId, since we can't tell which
// scheme produced it just from the number.
function pickDefaultVariant(variantPrices, requestedVariantId){
  if(!variantPrices || !variantPrices.length) return null;
  if(requestedVariantId != null){
    const match = variantPrices.find(v => String(v.id)===String(requestedVariantId) || String(v.option_id)===String(requestedVariantId));
    if(match) return match;
  }
  return variantPrices.find(v=>v.available!==false) || variantPrices[0];
}

function cleanName(n){return (n||'').replace(/\b(925|Sterling Silver|Silver|Gold Plated|Plated)\b/gi,'').replace(/\s{2,}/g,' ').trim();}
function trunc(s,n){return s&&s.length>n?s.slice(0,n)+'…':s||'';}

function show(id){document.getElementById(id).classList.remove('hidden');}
function hide(id){document.getElementById(id).classList.add('hidden');}

// Meta's own checkout redirect identifies each cart line by retailer_id, not
// by our plain product_id — and retailer_id for any multi-variant product is
// "{product_id}-{variant_id_or_option_id}" (see meta_feed.py's catalog_id).
// A naive parseInt("802-15") silently truncates to 802 and drops the "-15"
// entirely, which is exactly why this bridge kept defaulting to whatever
// pickDefaultVariant()'s fallback picked regardless of which variant the
// customer chose in Shop — found live 2026-07-21, this is the real gap
// last night's ?variant_ids= param never actually closed (that param isn't
// a real Meta merge variable; Meta never sends it). Splitting the token
// itself is the only reliable source. A bare numeric token (legacy
// single-variant retailer_id, or a pre-migration catalog row) has no
// suffix and still parses as just the product id, unchanged from before.
function _splitRetailerId(token){
  const m = /^(\d+)(?:-(\d+))?$/.exec((token||'').trim());
  if(!m) return {id:NaN, variantId:null};
  return {id:parseInt(m[1]), variantId: m[2]!=null ? parseInt(m[2]) : null};
}

function parseProducts(){
  const p = new URLSearchParams(window.location.search);
  // Kept as an optional override alongside the retailer_id suffix above —
  // harmless if Meta never sends it (stays null and _splitRetailerId's
  // result is used instead).
  const variantIdsParam = p.get('variant_ids');
  const variantIds = variantIdsParam
    ? variantIdsParam.split(',').map(s => { const n = parseInt(s.trim()); return isNaN(n) ? null : n; })
    : [];

  // Primary format: products=504:2,689-12:3 (id half may itself be a
  // composite retailer_id, see _splitRetailerId above)
  const productsParam = p.get('products');
  if(productsParam){
    return productsParam.split(',')
      .map((pair,i) => {
        const [idToken,qty] = pair.split(':');
        const {id, variantId} = _splitRetailerId(idToken);
        return {id, qty:parseInt(qty)||1, variantId: variantIds[i] ?? variantId};
      })
      .filter(x => !isNaN(x.id) && x.id > 0);
  }

  // Legacy format: product_ids=504,689-12&quantities=2,3
  const idsParam = p.get('product_ids');
  if(idsParam){
    const parsed = idsParam.split(',').map(s=>_splitRetailerId(s)).filter(x=>!isNaN(x.id));
    const qtys = (p.get('quantities')||'').split(',').map(s=>parseInt(s.trim())||1);
    return parsed.map(({id,variantId},i) => ({id, qty: qtys[i]||1, variantId: variantIds[i] ?? variantId}));
  }

  return [];
}

async function fetchProduct(id){
  const res = await fetch(`${API}/products/${id}`);
  if(!res.ok) return null;
  return res.json();
}

function renderProductRow(product, qty, variant){
  const list = document.getElementById('product-list');
  const row = document.createElement('div');
  row.className = 'product-row';
  const variantLabel = variant ? [variant.color, variant.size].filter(Boolean).join(' · ') : '';
  row.innerHTML = `
    <div class="product-img">
      <img src="${product.content_image_url||product.image_url||''}"
           onerror="this.style.display='none'" alt=""/>
    </div>
    <div class="product-info">
      <div class="product-name">${cleanName(product.name)}</div>
      ${variantLabel ? `<div class="product-variant">${variantLabel}</div>` : ''}
      <div class="product-qty">Qty ${qty}${!variantLabel && product.category ? ` &nbsp;·&nbsp; ${product.category}` : ''}</div>
    </div>
    <div class="product-price">$${(product.final_price*qty).toFixed(2)}</div>
    <div class="product-check">✦</div>
  `;
  list.appendChild(row);
}

async function run(){
  const pairs = parseProducts();

  if(!pairs.length){
    hide('state-loading');
    show('state-error');
    setTimeout(()=>{ window.location.href = STORE; }, 3000);
    return;
  }

  let added = 0;
  show('product-list');

  for(const {id, qty, variantId} of pairs){
    try{
      const [product, variantPrices] = await Promise.all([fetchProduct(id), fetchVariantPrices(id)]);
      if(product && product.id){
        const variant = pickDefaultVariant(variantPrices, variantId);
        addToCart(product, qty, variant);
        renderProductRow(product, qty, variant);
        hide('state-loading');
        added++;
      }
    }catch(_){}
  }

  if(added === 0){
    hide('product-list');
    hide('state-loading');
    show('state-error');
    setTimeout(()=>{ window.location.href = STORE; }, 3000);
    return;
  }

  if(typeof fbq==='function'){
    const _cart=getCart();
    fbq('track','InitiateCheckout',{
      content_ids:_cart.map(i=>String(i.product_id)),
      content_type:'product',
      num_items:_cart.reduce((s,i)=>s+i.quantity,0),
      value:_cart.reduce((s,i)=>s+i.subtotal,0),
      currency:'USD'
    });
  }

  // Show done state with progress bar then redirect
  hide('state-loading');
  show('state-done');

  const fill = document.getElementById('progress-fill');
  const duration = 1800;
  const interval = 30;
  let elapsed = 0;
  const timer = setInterval(()=>{
    elapsed += interval;
    fill.style.width = Math.min(100, (elapsed/duration)*100) + '%';
    if(elapsed >= duration){
      clearInterval(timer);
      window.location.href = STORE + '/?cart=open';
    }
  }, interval);
}

run();
</script>

</body>
</html>
